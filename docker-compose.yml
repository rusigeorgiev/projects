services:
  backend:
    build:
      context: ./backend
    container_name: project-switchboard-backend
    environment:
      PORT: ${BACKEND_PORT:-8080}
      DATA_FILE: ${DATA_FILE:-/app/data/projects.json}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: project-switchboard-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    restart: unless-stopped
